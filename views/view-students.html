<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory | Smart Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #4f46e5; --bg-light: #f8f9fa; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        .navbar-brand { font-weight: 700; color: var(--primary-color) !important; }
        .sidebar { min-height: calc(100vh - 56px); background-color: #ffffff; border-right: 1px solid #edf2f7; position: relative; z-index: 10; }
        .nav-link { color: #4a5568; font-weight: 500; padding: 12px 20px; border-radius: 8px; margin: 4px 12px; transition: all 0.2s; }
        .nav-link:hover { background-color: #f1f5f9; color: var(--primary-color); }
        .nav-link.active { background-color: var(--primary-color); color: #ffffff !important; }
        .table-card { border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.02); background-color: #ffffff; border: 1px solid #edf2f7; }
        .badge-course { background-color: rgba(79, 70, 229, 0.1) !important; color: var(--primary-color) !important; font-weight: 600; padding: 6px 12px; border-radius: 6px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm" style="z-index: 1030;">
    <div class="container-fluid">
        <a class="navbar-brand px-3" href="/dashboard">Smart Student Management System</a>
        <div class="ms-auto pe-3"><span class="text-secondary small me-3">Role: <strong>Admin</strong></span><a href="/login" class="btn btn-sm btn-outline-danger fw-semibold px-3">Logout</a></div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-0 pt-3">
            <div class="position-sticky">
                <ul class="nav flex-column">
                    <li><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li><a class="nav-link" href="/add-student">Add Student</a></li>
                    <li><a class="nav-link active" href="/view-students">View Students</a></li>
                    <li><a class="nav-link" href="/attendance">Attendance</a></li>
                    <li><a class="nav-link" href="/marks-entry">Marks Entry</a></li>
                    <li><a class="nav-link" href="/reports">Reports</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
            <div class="pt-3 pb-2 mb-4 border-bottom">
                <h1 class="h2 fw-bold text-dark m-0">Student Directory</h1>
                <p class="text-muted small">Manage, alter, or remove live profiles seamlessly.</p>
            </div>
            <div id="actionAlert" class="alert d-none shadow-sm fw-medium" role="alert"></div>
            <div class="card table-card p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle m-0">
                        <thead class="table-light">
                            <tr>
                                <th class="py-3 ps-3">DB Key</th>
                                <th class="py-3">Roll ID</th>
                                <th class="py-3">Full Name</th>
                                <th class="py-3">Email Address</th>
                                <th class="py-3">Course</th>
                                <th class="py-3 text-center">Actions Panel</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius:12px; border:none; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
            <div class="modal-header bg-light"><h5 class="fw-bold m-0">Modify Student Record</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body p-4">
                <form id="editForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3"><label class="form-label fw-semibold">Roll Number (Read-Only)</label><input type="text" class="form-control bg-light" id="editRollNo" readonly></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Student Name</label><input type="text" class="form-control" id="editName" required></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Email Address</label><input type="email" class="form-control" id="editEmail" required></div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Course Pathway</label>
                        <select class="form-select" id="editCourse" required>
                            <option value="BCA">Bachelor of Computer Applications (BCA)</option>
                            <option value="BSc">Bachelor of Science (BSc)</option>
                            <option value="BCom">Bachelor of Commerce (BCom)</option>
                            <option value="BBA">Bachelor of Business Administration (BBA)</option>
                        </select>
                    </div>
                    <div class="d-flex justify-content-end gap-2 pt-3 border-top mt-4">
                        <button type="button" class="btn btn-light border fw-semibold" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary fw-semibold" style="background-color: var(--primary-color); border:none; padding: 8px 20px;">Update Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let modalInstance;
    document.addEventListener("DOMContentLoaded", () => { modalInstance = new bootstrap.Modal(document.getElementById('editModal')); });

    async function loadTable() {
        const tbody = document.getElementById('studentTableBody');
        try {
            const r = await fetch('/api/students');
            const d = await r.json();
            if (d.success && d.data.length > 0) {
                tbody.innerHTML = "";
                d.data.forEach(s => {
                    const cleanName = s.name.replace(/'/g, "\\'");
                    const cleanEmail = s.email.replace(/'/g, "\\'");
                    tbody.innerHTML += `
                        <tr>
                            <td class="py-3 ps-3 fw-bold text-secondary">#${s.id}</td>
                            <td><span class="badge bg-light text-dark border fw-semibold">${s.roll_no}</span></td>
                            <td class="fw-semibold text-dark">${s.name}</td>
                            <td class="text-secondary">${s.email}</td>
                            <td><span class="badge badge-course">${s.course}</span></td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary fw-semibold me-1" onclick="openEdit(${s.id}, '${s.roll_no}', '${cleanName}', '${cleanEmail}', '${s.course}')">Edit</button>
                                <button class="btn btn-sm btn-outline-danger fw-semibold" onclick="deleteRow(${s.id})">Delete</button>
                            </td>
                        </tr>`;
                });
            } else { tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-5">No profiles found.</td></tr>`; }
        } catch (err) { tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-5">Error parsing records.</td></tr>`; }
    }

    function openEdit(id, roll, name, email, course) {
        document.getElementById('editId').value = id;
        document.getElementById('editRollNo').value = roll;
        document.getElementById('editName').value = name;
        document.getElementById('editEmail').value = email;
        document.getElementById('editCourse').value = course;
        if(modalInstance) modalInstance.show();
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const name = document.getElementById('editName').value.trim();
        const email = document.getElementById('editEmail').value.trim();
        const course = document.getElementById('editCourse').value;

        const r = await fetch(`/api/students/update/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, course })
        });
        const d = await r.json();
        showAlert(d.success, d.message);
        if(modalInstance) modalInstance.hide();
        loadTable();
    });

    async function deleteRow(id) {
        if (confirm("Are you completely sure you want to drop this record profile row?")) {
            const r = await fetch(`/api/students/delete/${id}`, { method: 'DELETE' });
            const d = await r.json();
            showAlert(d.success, d.message);
            loadTable();
        }
    }

    function showAlert(success, msg) {
        const b = document.getElementById('actionAlert');
        b.className = `alert ${success ? 'alert-success' : 'alert-danger'} d-block`;
        b.innerText = msg;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setTimeout(() => b.className = "alert d-none", 3000);
    }
    window.onload = loadTable;
</script>
</body>
</html>
