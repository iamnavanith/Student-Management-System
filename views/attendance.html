<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Attendance Tracking | Smart Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #4f46e5; --bg-light: #f8f9fa; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        .navbar-brand { font-weight: 700; color: var(--primary-color) !important; }
        .sidebar { min-height: calc(100vh - 56px); background-color: #ffffff; border-right: 1px solid #edf2f7; position: relative; z-index: 10; }
        .nav-link { color: #4a5568; font-weight: 500; padding: 12px 20px; border-radius: 8px; margin: 4px 12px; transition: all 0.2s; }
        .nav-link:hover { background-color: #f1f5f9; color: var(--primary-color); }
        .nav-link.active { background-color: var(--primary-color); color: #ffffff !important; }
        .workspace-card { border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.02); background-color: #ffffff; border: 1px solid #edf2f7; }
        .btn-check:checked + .btn-outline-success { background-color: #10b981 !important; color: #fff !important; }
        .btn-check:checked + .btn-outline-danger { background-color: #ef4444 !important; color: #fff !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm" style="z-index: 1030;">
    <div class="container-fluid">
        <a class="navbar-brand px-3" href="/dashboard">Smart Student Management System</a>
        <div class="ms-auto pe-3"><span class="text-secondary small me-3">Role: <strong>Admin</strong></span><a href="/login" class="btn btn-sm btn-outline-danger fw-semibold px-3">Logout</a></div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-0 pt-3">
            <div class="position-sticky">
                <ul class="nav flex-column">
                    <li><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li><a class="nav-link" href="/add-student">Add Student</a></li>
                    <li><a class="nav-link" href="/view-students">View Students</a></li>
                    <li><a class="nav-link active" href="/attendance">Attendance</a></li>
                    <li><a class="nav-link" href="/marks-entry">Marks Entry</a></li>
                    <li><a class="nav-link" href="/reports">Reports</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
            <div class="pt-3 pb-2 mb-4 border-bottom"><h1 class="h2 fw-bold text-dark m-0">Daily Attendance Tracking</h1></div>
            <div id="statusAlert" class="alert d-none shadow-sm fw-medium mb-4" role="alert"></div>
            <div class="card workspace-card p-4 mb-4">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Academic Stream Course</label>
                        <select id="courseSelect" class="form-select">
                            <option value="" disabled selected>Select Course Path...</option>
                            <option value="BCA">Bachelor of Computer Applications (BCA)</option>
                            <option value="BSc">Bachelor of Science (BSc)</option>
                            <option value="BCom">Bachelor of Commerce (BCom)</option>
                            <option value="BBA">Bachelor of Business Administration (BBA)</option>
                        </select>
                    </div>
                    <div class="col-md-4"><label class="form-label fw-semibold">Session Date</label><input type="date" id="attendanceDate" class="form-control"></div>
                    <div class="col-md-4"><button class="btn btn-primary fw-semibold w-100 py-2" style="background-color: var(--primary-color); border:none; height:42px;" onclick="loadRosterList()">Fetch Student Class</button></div>
                </div>
            </div>

            <div class="card workspace-card p-4 d-none" id="rosterCard">
                <div class="table-responsive">
                    <table class="table table-hover align-middle m-0">
                        <thead class="table-light"><tr><th class="py-3 ps-3">Roll ID Code</th><th class="py-3">Full Student Legal Name</th><th class="py-3 text-center" style="width:280px;">Status Switches</th></tr></thead>
                        <tbody id="rosterTableBody"></tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-end mt-4 pt-3 border-top"><button class="btn btn-success fw-semibold px-5 py-2.5" onclick="submitAttendanceRoster()">Verify & Save Attendance</button></div>
            </div>
        </main>
    </div>
</div>

<script>
    document.getElementById('attendanceDate').valueAsDate = new Date();

    async function loadRosterList() {
        const course = document.getElementById('courseSelect').value;
        if (!course) { alert("Please select a valid academic pathway stream."); return; }
        const tbody = document.getElementById('rosterTableBody');
        tbody.innerHTML = `<tr><td colspan="3" class="text-center py-5 text-muted">Pulling student arrays...</td></tr>`;
        document.getElementById('rosterCard').classList.remove('d-none');
        try {
            const r = await fetch(`/api/attendance/students?course=${course}`);
            const d = await r.json();
            if (d.success && d.data.length > 0) {
                tbody.innerHTML = "";
                d.data.forEach(student => {
                    tbody.innerHTML += `
                        <tr>
                            <td class="py-3.5 ps-3 fw-bold font-monospace text-secondary">${student.roll_no}</td>
                            <td class="fw-semibold text-dark">${student.name}</td>
                            <td class="text-center">
                                <div class="btn-group w-75" role="group">
                                    <input type="radio" class="btn-check" name="status_${student.id}" id="p_${student.id}" value="Present" checked>
                                    <label class="btn btn-sm btn-outline-success fw-semibold py-2" for="p_${student.id}">Present</label>
                                    <input type="radio" class="btn-check" name="status_${student.id}" id="a_${student.id}" value="Absent">
                                    <label class="btn btn-sm btn-outline-danger fw-semibold py-2" for="a_${student.id}">Absent</label>
                                </div>
                            </td>
                        </tr>`;
                });
            } else { tbody.innerHTML = `<tr><td colspan="3" class="text-center py-5 text-warning fw-medium">No students registered in ${course}.</td></tr>`; }
        } catch (e) { tbody.innerHTML = `<tr><td colspan="3" class="text-center py-5 text-danger">Error querying server endpoints.</td></tr>`; }
    }

    async function submitAttendanceRoster() {
        const date = document.getElementById('attendanceDate').value;
        const rows = document.getElementById('rosterTableBody').getElementsByTagName('tr');
        const alertBox = document.getElementById('statusAlert');
        if (rows.length === 0 || rows[0].innerText.includes("No students")) return;
        const records = [];
        for (let row of rows) {
            const radioPresent = row.querySelector('input[value="Present"]');
            if (!radioPresent) continue;
            const studentId = radioPresent.name.split('_')[1];
            const statusValue = radioPresent.checked ? 'Present' : 'Absent';
            records.push({ student_id: parseInt(studentId), status: statusValue });
        }
        try {
            const r = await fetch('/api/attendance/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date, records })
            });
            const d = await r.json();
            alertBox.className = `alert ${d.success ? 'alert-success' : 'alert-danger'} d-block`;
            alertBox.innerText = d.message;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => alertBox.className = "alert d-none", 3500);
        } catch (e) { alertBox.className = "alert alert-danger d-block"; alertBox.innerText = "Error submitting transaction."; }
    }
</script>
</body>
</html>
