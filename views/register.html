<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Smart Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .register-card {
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 24px !important;
            background: rgba(30, 41, 59, 0.7) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
        }
        .register-card h3 { color: #ffffff !important; }
        .register-card label { color: #cbd5e1 !important; }
        .register-card input {
            background-color: rgba(15, 23, 42, 0.6) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }
        .register-card input:focus {
            border-color: var(--primary-light) !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25) !important;
        }
        .register-card .input-group-text {
            background-color: rgba(15, 23, 42, 0.6) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: #64748b !important;
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .login-link a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .login-link a:hover {
            color: #a5b4fc;
            text-decoration: underline;
        }

        /* Password Strength Meter */
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            transition: all 0.3s;
        }
        .password-strength .bar {
            height: 100%;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0;
        }
        .strength-text {
            font-size: 0.7rem;
            margin-top: 4px;
            font-weight: 600;
        }

        /* Phone input */
        .phone-row {
            display: flex;
            gap: 8px;
        }
        .phone-row .country-code-input {
            width: 80px;
            flex-shrink: 0;
            text-align: center;
            font-weight: 600;
            border-radius: 12px !important;
        }

        /* Password match indicator */
        .match-indicator {
            font-size: 0.75rem;
            margin-top: 4px;
            font-weight: 600;
        }
    </style>
</head>
<body class="login-body">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card register-card p-4 p-md-5 fade-in">
                <div class="card-body">
                    <!-- Header -->
                    <div class="text-center mb-4">
                        <div class="mb-3 d-inline-block">
                            <span class="p-3 rounded-4 d-inline-flex align-items-center justify-content-center" style="width: 60px; height: 60px; background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(5, 150, 105, 0.15) 100%);">
                                <i class="fa-solid fa-user-plus fa-2x" style="background: linear-gradient(135deg, #10b981, #059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                            </span>
                        </div>
                        <h3 class="fw-bold mb-1">Create Account</h3>
                        <p class="text-secondary small">Join the Smart Student Management System</p>
                    </div>

                    <!-- Alert Box -->
                    <div id="alertBox" class="alert d-none" role="alert"></div>

                    <!-- Registration Form -->
                    <form id="registerForm">
                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="fullname" class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-user text-secondary"></i></span>
                                <input type="text" class="form-control border-start-0 ps-1" id="fullname" placeholder="Enter your full name" required style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="reg-username" class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-at text-secondary"></i></span>
                                <input type="text" class="form-control border-start-0 ps-1" id="reg-username" placeholder="Choose a username" required style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="reg-email" class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-envelope text-secondary"></i></span>
                                <input type="email" class="form-control border-start-0 ps-1" id="reg-email" placeholder="you@example.com" required style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>

                        <!-- Phone (Optional) -->
                        <div class="mb-3">
                            <label for="reg-phone" class="form-label fw-semibold">Phone Number <span class="text-secondary small fw-normal">(Optional — needed for OTP login)</span></label>
                            <div class="phone-row">
                                <input type="text" class="form-control country-code-input" value="+91" readonly>
                                <div class="input-group flex-grow-1">
                                    <span class="input-group-text bg-transparent border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-phone text-secondary"></i></span>
                                    <input type="tel" class="form-control border-start-0 ps-1" id="reg-phone" placeholder="10-digit number" maxlength="10" style="border-radius: 0 12px 12px 0;">
                                </div>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="reg-password" class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-lock text-secondary"></i></span>
                                <input type="password" class="form-control border-start-0 ps-1" id="reg-password" placeholder="Minimum 6 characters" required minlength="6" style="border-radius: 0 12px 12px 0;">
                            </div>
                            <div class="password-strength">
                                <div class="bar" id="strengthBar"></div>
                            </div>
                            <div class="strength-text" id="strengthText"></div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label for="reg-confirm-password" class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-shield-halved text-secondary"></i></span>
                                <input type="password" class="form-control border-start-0 ps-1" id="reg-confirm-password" placeholder="Repeat password" required style="border-radius: 0 12px 12px 0;">
                            </div>
                            <div class="match-indicator" id="matchIndicator"></div>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold py-3" id="registerBtn" style="background: linear-gradient(135deg, #10b981, #059669);">
                                <i class="fa-solid fa-user-plus me-2"></i>Create Account
                            </button>
                        </div>
                    </form>

                    <!-- Login Link -->
                    <div class="login-link">
                        <span class="text-secondary small">Already have an account? </span>
                        <a href="/login">Sign In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const alertBox = document.getElementById('alertBox');

    function showAlert(message, type) {
        alertBox.className = 'alert alert-' + type;
        alertBox.innerHTML = message;
        alertBox.classList.remove('d-none');
        // Scroll to top of card
        alertBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // ===== Password Strength Meter =====
    document.getElementById('reg-password').addEventListener('input', (e) => {
        const password = e.target.value;
        const bar = document.getElementById('strengthBar');
        const text = document.getElementById('strengthText');
        let score = 0;

        if (password.length >= 6) score++;
        if (password.length >= 10) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;

        const levels = [
            { width: '0%', color: 'transparent', label: '' },
            { width: '20%', color: '#f43f5e', label: 'Very Weak' },
            { width: '40%', color: '#f59e0b', label: 'Weak' },
            { width: '60%', color: '#f59e0b', label: 'Fair' },
            { width: '80%', color: '#10b981', label: 'Strong' },
            { width: '100%', color: '#059669', label: 'Very Strong' }
        ];

        const level = levels[score];
        bar.style.width = level.width;
        bar.style.background = level.color;
        text.textContent = level.label;
        text.style.color = level.color;

        // Also check confirm match
        checkPasswordMatch();
    });

    // ===== Password Match Checker =====
    document.getElementById('reg-confirm-password').addEventListener('input', checkPasswordMatch);

    function checkPasswordMatch() {
        const pass = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm-password').value;
        const indicator = document.getElementById('matchIndicator');

        if (!confirm) {
            indicator.textContent = '';
            return;
        }

        if (pass === confirm) {
            indicator.innerHTML = '<i class="fa-solid fa-circle-check me-1"></i>Passwords match';
            indicator.style.color = '#10b981';
        } else {
            indicator.innerHTML = '<i class="fa-solid fa-circle-xmark me-1"></i>Passwords do not match';
            indicator.style.color = '#f43f5e';
        }
    }

    // ===== Form Submission =====
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const fullname = document.getElementById('fullname').value.trim();
        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirmPassword = document.getElementById('reg-confirm-password').value;

        // Client-side validation
        if (!fullname || !username || !email || !password) {
            showAlert('<i class="fa-solid fa-circle-exclamation me-2"></i>Please fill in all required fields.', 'danger');
            return;
        }

        if (password.length < 6) {
            showAlert('<i class="fa-solid fa-circle-exclamation me-2"></i>Password must be at least 6 characters long.', 'danger');
            return;
        }

        if (password !== confirmPassword) {
            showAlert('<i class="fa-solid fa-circle-exclamation me-2"></i>Passwords do not match.', 'danger');
            return;
        }

        if (phone && phone.length !== 10) {
            showAlert('<i class="fa-solid fa-circle-exclamation me-2"></i>Phone number must be exactly 10 digits.', 'danger');
            return;
        }

        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Creating Account...';

        try {
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullname, username, email, phone, password })
            });

            const data = await response.json();

            if (data.success) {
                showAlert('<i class="fa-solid fa-circle-check me-2"></i>' + data.message, 'success');
                setTimeout(() => { window.location.href = '/login'; }, 2000);
            } else {
                showAlert('<i class="fa-solid fa-circle-exclamation me-2"></i>' + data.message, 'danger');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Create Account';
            }
        } catch (error) {
            showAlert('<i class="fa-solid fa-circle-exclamation me-2"></i>Server error. Please try again.', 'danger');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Create Account';
        }
    });
</script>
</body>
</html>
