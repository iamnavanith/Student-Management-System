<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Student | Smart Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet:preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet:preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="fa-solid fa-graduation-cap me-2 text-primary"></i>Smart Student Management System
        </a>
        <div class="ms-auto pe-3 d-flex align-items-center gap-2">
            <span class="developer-badge">
                <i class="fa-solid fa-code text-primary"></i>Developer: <strong class="text-dark">Navaneeth N G</strong>
            </span>
            <span class="role-badge">
                <i class="fa-solid fa-user-shield"></i>Admin
            </span>
            <a href="/login" class="btn btn-sm btn-outline-danger fw-semibold px-3 ms-2">
                <i class="fa-solid fa-right-from-bracket me-1"></i>Logout
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-0">
            <div class="position-sticky">
                <div class="px-4 py-3 mb-2 border-bottom border-secondary border-opacity-10 text-center">
                    <span class="text-light opacity-50 small text-uppercase fw-bold" style="letter-spacing: 1px; font-size: 0.75rem;">Navigation</span>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fa-solid fa-chart-pie me-3"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/add-student"><i class="fa-solid fa-user-plus me-3"></i>Add Student</a></li>
                    <li class="nav-item"><a class="nav-link" href="/view-students"><i class="fa-solid fa-users me-3"></i>View Students</a></li>
                    <li class="nav-item"><a class="nav-link" href="/attendance"><i class="fa-solid fa-calendar-check me-3"></i>Attendance</a></li>
                    <li class="nav-item"><a class="nav-link" href="/marks-entry"><i class="fa-solid fa-file-signature me-3"></i>Marks Entry</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports"><i class="fa-solid fa-chart-line me-3"></i>Reports</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4 fade-in">
            <div class="pt-3 pb-2 mb-4 border-bottom">
                <h1 class="h2 fw-bold text-dark m-0">Student Registration</h1>
                <p class="text-muted small">Register a new student profile in the database.</p>
            </div>
            
            <div class="card form-card p-4 p-md-5">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <span class="p-2 bg-primary bg-opacity-10 rounded-3 text-primary">
                        <i class="fa-solid fa-address-card fa-lg"></i>
                    </span>
                    <h5 class="fw-bold text-dark m-0">Official Admission Entry Form</h5>
                </div>
                
                <div id="responseMessage" class="alert d-none shadow-sm fw-medium mb-4" role="alert"></div>
                
                <form id="addStudentForm" class="needs-validation" novalidate>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Roll Number / Registration ID</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-secondary border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-id-card"></i></span>
                                <input type="text" class="form-control border-start-0 ps-1" id="roll_no" placeholder="e.g., BCA-2026-001" required style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Full Student Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-secondary border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-user"></i></span>
                                <input type="text" class="form-control border-start-0 ps-1" id="name" placeholder="Enter full name" required style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-secondary border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-envelope"></i></span>
                                <input type="email" class="form-control border-start-0 ps-1" id="email" placeholder="student@example.com" required style="border-radius: 0 12px 12px 0;">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Assigned Academic Course</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-secondary border-end-0" style="border-radius: 12px 0 0 12px;"><i class="fa-solid fa-graduation-cap"></i></span>
                                <select class="form-select border-start-0 ps-1" id="course" required style="border-radius: 0 12px 12px 0;">
                                    <option value="" disabled selected>Choose Degree Course...</option>
                                    <option value="BCA">Bachelor of Computer Applications (BCA)</option>
                                    <option value="BSc">Bachelor of Science (BSc)</option>
                                    <option value="BCom">Bachelor of Commerce (BCom)</option>
                                    <option value="BBA">Bachelor of Business Administration (BBA)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-top d-flex justify-content-end gap-2">
                        <button type="reset" class="btn btn-light px-4">Clear Form</button>
                        <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-floppy-disk me-2"></i>Save Profile Record</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>

<script>
    document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgContainer = document.getElementById('responseMessage');
        const roll_no = document.getElementById('roll_no').value.trim();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const course = document.getElementById('course').value;

        if (!roll_no || !name || !email || !course) return;

        try {
            const r = await fetch('/add-student', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roll_no, name, email, course })
            });
            const d = await r.json();
            msgContainer.className = `alert ${d.success ? 'alert-success' : 'alert-danger'} d-block`;
            msgContainer.innerText = d.message;
            if (d.success) document.getElementById('addStudentForm').reset();
        } catch (err) {
            msgContainer.className = "alert alert-danger d-block";
            msgContainer.innerText = "Connection error occurred.";
        }
    });
</script>
</body>
</html>
