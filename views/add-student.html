<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Student | Smart Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #4f46e5; --bg-light: #f8f9fa; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        .navbar-brand { font-weight: 700; color: var(--primary-color) !important; }
        .sidebar { min-height: calc(100vh - 56px); background-color: #ffffff; border-right: 1px solid #edf2f7; position: relative; z-index: 10; }
        .nav-link { color: #4a5568; font-weight: 500; padding: 12px 20px; border-radius: 8px; margin: 4px 12px; transition: all 0.2s; }
        .nav-link:hover { background-color: #f1f5f9; color: var(--primary-color); }
        .nav-link.active { background-color: var(--primary-color); color: #ffffff !important; }
        .form-card { border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.02); background-color: #ffffff; border: 1px solid #edf2f7; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm" style="z-index: 1030;">
    <div class="container-fluid">
        <a class="navbar-brand px-3" href="/dashboard">Smart Student Management System</a>
        <div class="ms-auto pe-3"><span class="text-secondary small me-3">Role: <strong>Admin</strong></span><a href="/login" class="btn btn-sm btn-outline-danger fw-semibold px-3">Logout</a></div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-0 pt-3">
            <div class="position-sticky">
                <ul class="nav flex-column">
                    <li><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li><a class="nav-link active" href="/add-student">Add Student</a></li>
                    <li><a class="nav-link" href="/view-students">View Students</a></li>
                    <li><a class="nav-link" href="/attendance">Attendance</a></li>
                    <li><a class="nav-link" href="/marks-entry">Marks Entry</a></li>
                    <li><a class="nav-link" href="/reports">Reports</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
            <div class="pt-3 pb-2 mb-4 border-bottom"><h1 class="h2 fw-bold text-dark m-0">Student Registration</h1></div>
            <div class="card form-card p-4 p-md-5">
                <h5 class="fw-bold text-dark mb-4">Official Admission Entry Form</h5>
                <div id="responseMessage" class="alert d-none shadow-sm fw-medium" role="alert"></div>
                <form id="addStudentForm" class="needs-validation" novalidate>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Roll Number / Registration ID</label>
                            <input type="text" class="form-control p-2.5" id="roll_no" placeholder="e.g., BCA-2026-001" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Full Student Name</label>
                            <input type="text" class="form-control p-2.5" id="name" placeholder="Enter full name" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control p-2.5" id="email" placeholder="student@example.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Assigned Academic Course</label>
                            <select class="form-select p-2.5" id="course" required>
                                <option value="" disabled selected>Choose Degree Course...</option>
                                <option value="BCA">Bachelor of Computer Applications (BCA)</option>
                                <option value="BSc">Bachelor of Science (BSc)</option>
                                <option value="BCom">Bachelor of Commerce (BCom)</option>
                                <option value="BBA">Bachelor of Business Administration (BBA)</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                        <button type="reset" class="btn btn-light border fw-semibold px-4">Clear Form</button>
                        <button type="submit" class="btn btn-primary fw-semibold px-4" style="background-color: var(--primary-color); border:none;">Save Profile Record</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>

<script>
    document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgContainer = document.getElementById('responseMessage');
        const roll_no = document.getElementById('roll_no').value.trim();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const course = document.getElementById('course').value;

        if (!roll_no || !name || !email || !course) return;

        try {
            const r = await fetch('/add-student', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roll_no, name, email, course })
            });
            const d = await r.json();
            msgContainer.className = `alert ${d.success ? 'alert-success' : 'alert-danger'} d-block`;
            msgContainer.innerText = d.message;
            if (d.success) document.getElementById('addStudentForm').reset();
        } catch (err) {
            msgContainer.className = "alert alert-danger d-block";
            msgContainer.innerText = "Connection error occurred.";
        }
    });
</script>
</body>
</html>
